<!DOCTYPE html>
<html>
<head>
  <title>Pose Estimation Pro</title>

  <!-- FIX CDN (WAJIB) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body {
      display:flex;
      flex-direction:row;
      justify-content:center;
      align-items:flex-start;
      font-family:sans-serif;
      background:#f0f0f0;
      margin:20px;
    }

    #container {
      position:relative;
      width:480px;
      height:480px;
    }

    video {
      position:absolute;
      width:480px;
      height:480px;
      transform:scaleX(-1); /* mirror */
    }

    canvas {
      position:absolute;
      width:480px;
      height:480px;
      pointer-events:none;
    }

    #output {
      background:#eee;
      padding:10px;
      margin-left:20px;
      width:250px;
      white-space:pre-wrap;
      font-size:14px;
    }

    #capture {
      position:fixed;
      top:20px;
      right:20px;
      z-index:100;
      padding:10px 20px;
      font-size:16px;
      background:#28a745;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas" width="480" height="480"></canvas>
</div>

<pre id="output"></pre>
<button id="capture">Ambil Gambar</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const output = document.getElementById('output');
const captureBtn = document.getElementById('capture');

const videoWidth = 480;
const videoHeight = 480;
const userHeightCm = 170;

// anti crash
const safe = v => (v !== undefined && !isNaN(v)) ? v.toFixed(1) : '-';

// koneksi skeleton
const connections = [
  ['left_shoulder','right_shoulder'],
  ['left_shoulder','left_elbow'], ['left_elbow','left_wrist'],
  ['right_shoulder','right_elbow'], ['right_elbow','right_wrist'],
  ['left_shoulder','left_hip'], ['right_shoulder','right_hip'],
  ['left_hip','right_hip'],
  ['left_hip','left_knee'], ['left_knee','left_ankle'],
  ['right_hip','right_knee'], ['right_knee','right_ankle']
];

// kamera
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:videoWidth,height:videoHeight},
    audio:false
  });
  video.srcObject = stream;
  return new Promise(resolve=>{
    video.onloadeddata = ()=>resolve();
  });
}

// sudut
function getAngle(A,B,C){
  if(!A||!B||!C) return 0;
  const AB = {x:A.x-B.x,y:A.y-B.y};
  const CB = {x:C.x-B.x,y:C.y-B.y};
  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);
  return Math.acos(dot/(magAB*magCB))*(180/Math.PI);
}

// gambar skeleton
function drawPose(keypoints){
  ctx.strokeStyle='blue';
  ctx.lineWidth=3;

  connections.forEach(pair=>{
    const a = keypoints.find(k=>k.name===pair[0]);
    const b = keypoints.find(k=>k.name===pair[1]);

    if(a && b && a.score>0.3 && b.score>0.3){
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }
  });

  keypoints.forEach(k=>{
    if(k.score>0.3){
      ctx.beginPath();
      ctx.arc(k.x,k.y,5,0,2*Math.PI);
      ctx.fillStyle='red';
      ctx.fill();
    }
  });
}

// konversi cm
function yToCm(y,minY,maxY){
  return (y-minY)*userHeightCm/(maxY-minY);
}

async function main(){
  await setupCamera();

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER}
  );

  async function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const poses = await detector.estimatePoses(video,{flipHorizontal:true});

    if(!poses || poses.length===0){
      output.textContent="Pose belum terdeteksi";
      requestAnimationFrame(loop);
      return;
    }

    const keypoints = poses[0].keypoints;
    drawPose(keypoints);

    const validY = keypoints.filter(k=>k.score>0.3).map(k=>k.y);
    const minY = Math.min(...validY);
    const maxY = Math.max(...validY);

    const kp = n => keypoints.find(k=>k.name===n);

    const heights = {
      kepala: yToCm(kp('nose')?.y,minY,maxY),
      bahuKiri: yToCm(kp('left_shoulder')?.y,minY,maxY),
      bahuKanan: yToCm(kp('right_shoulder')?.y,minY,maxY),
      pinggulKiri: yToCm(kp('left_hip')?.y,minY,maxY),
      pinggulKanan: yToCm(kp('right_hip')?.y,minY,maxY),
      lututKiri: yToCm(kp('left_knee')?.y,minY,maxY),
      lututKanan: yToCm(kp('right_knee')?.y,minY,maxY),
      kakiKiri: yToCm(kp('left_ankle')?.y,minY,maxY),
      kakiKanan: yToCm(kp('right_ankle')?.y,minY,maxY)
      tanganKiri: yToCm(kp('left_wrist')?.y,minY,maxY),
      tanganKanan: yToCm(kp('right_wrist')?.y,minY,maxY),
    };

    const angles = {
      sikuKiri: getAngle(kp('left_shoulder'),kp('left_elbow'),kp('left_wrist')),
      sikuKanan: getAngle(kp('right_shoulder'),kp('right_elbow'),kp('right_wrist')),
      lututKiri: getAngle(kp('left_hip'),kp('left_knee'),kp('left_ankle')),
      lututKanan: getAngle(kp('right_hip'),kp('right_knee'),kp('right_ankle'))
      bahuKiri: getAngle(kp('left_elbow'),kp('left_shoulder'),kp('left_hip')),
      bahuKanan: getAngle(kp('right_elbow'),kp('right_shoulder'),kp('right_hip')),
    };

    const safe = v => (v !== undefined && !isNaN(v)) ? v.toFixed(1) : '-';

    output.textContent = `
    KETINGGIAN (cm)
    Kepala: ${safe(heights.kepala)}
    Bahu Kiri: ${safe(heights.bahuKiri)}
    Bahu Kanan: ${safe(heights.bahuKanan)}
    Pinggul Kiri: ${safe(heights.pinggulKiri)}
    Pinggul Kanan: ${safe(heights.pinggulKanan)}
    Lutut Kiri: ${safe(heights.lututKiri)}
    Lutut Kanan: ${safe(heights.lututKanan)}
    Kaki Kiri: ${safe(heights.kakiKiri)}
    Kaki Kanan: ${safe(heights.kakiKanan)}
    Tangan Kiri: ${safe(heights.tanganKiri)}
    Tangan Kanan: ${safe(heights.tanganKanan)}
    
    SUDUT (°)
    Siku Kiri: ${safe(angles.sikuKiri)}
    Siku Kanan: ${safe(angles.sikuKanan)}
    Bahu Kiri: ${safe(angles.bahuKiri)}
    Bahu Kanan: ${safe(angles.bahuKanan)}
    Lutut Kiri: ${safe(angles.lututKiri)}
    Lutut Kanan: ${safe(angles.lututKanan)}
    `;

    requestAnimationFrame(loop);
  }

  loop();

  // capture FIX
  captureBtn.onclick=()=>{
    const temp = document.createElement('canvas');
    const tctx = temp.getContext('2d');

    temp.width = videoWidth + 260;
    temp.height = videoHeight;

    tctx.fillStyle="#f0f0f0";
    tctx.fillRect(0,0,temp.width,temp.height);

    tctx.save();
    tctx.scale(-1,1);
    tctx.drawImage(video,-videoWidth,0,videoWidth,videoHeight);
    tctx.restore();

    tctx.drawImage(canvas,0,0);

    tctx.fillStyle="black";
    tctx.font="14px sans-serif";

    output.textContent.split("\n").forEach((line,i)=>{
      tctx.fillText(line,videoWidth+10,20+i*18);
    });

    const link=document.createElement('a');
    link.download="pose.jpg";
    link.href=temp.toDataURL("image/jpeg");
    link.click();
  };
}

main();
</script>

</body>
</html>
