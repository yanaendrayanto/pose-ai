<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - Topeng Inferno</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;
let firstClick = false;
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= MASK =================
const maskImg = new Image();
maskImg.src = "panji.png"; // topeng wajah

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= PARTICLE =================
let particles = [];
function addFire(x,y){
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*1,
    vy: -Math.random()*2-0.5,
    size: Math.random()*8+4,
    life:1
  });
}
function addSmoke(x,y){
  particles.push({
    x, y,
    vx: (Math.random()-0.3, Math.random()*0.3),
    vy: -Math.random()*1.5-0.5,
    size: Math.random()*15+5,
    life: 1,
    type: "smoke"
  });
}
function drawParticles(){
  ctx.globalAlpha = 1;
  particles.forEach(p=>{
    if(p.type==="smoke"){
      ctx.fillStyle = `rgba(100,100,100,${p.life*0.4})`;
      ctx.beginPath();
      ctx.ellipse(p.x,p.y,p.size,p.size*0.6,0,0,2*Math.PI);
      ctx.fill();
    } else {
      const gradient = ctx.createRadialGradient(p.x,p.y,p.size*0.1,p.x,p.y,p.size);
      gradient.addColorStop(0,"rgba(255,255,100,1)");
      gradient.addColorStop(0.5,"rgba(255,100,0,0.7)");
      gradient.addColorStop(1,"rgba(100,0,0,0)");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,2*Math.PI);
      ctx.fill();
    }
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.01;
  });
  particles = particles.filter(p=>p.life>0);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name], k);
          lastFrame[k.name] = k;
          if(speed>6) detectedMovement = true;

          // Tambah api & asap hanya di tubuh, tangan, kaki (hindari kepala)
          if(!["nose","left_eye","right_eye","left_ear","right_ear","left_mouth","right_mouth"].includes(k.name)){
            addFire(k.x,k.y);
            addSmoke(k.x,k.y);
          }
        }
      });
    });

    // Gambar topeng di wajah
    poses.forEach(pose=>{
      const nose = pose.keypoints.find(k=>k.name==="nose");
      if(nose && nose.score>0.4){
        const leftEye = pose.keypoints.find(k=>k.name==="left_eye");
        const rightEye = pose.keypoints.find(k=>k.name==="right_eye");
        const width = Math.abs(rightEye.x-leftEye.x)*2;
        const height = width * maskImg.height/maskImg.width;
        ctx.drawImage(maskImg, nose.x-width/2, nose.y-height/2, width, height);
      }
    });

    // Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }
    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + detectedMovement?0.5:0));
    }
    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    drawParticles();
    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
