<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;
let firstClick = false;

window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= PARTICLES =================
let fireParticles = [];
let smokeParticles = [];

function addFire(x,y){
  fireParticles.push({
    x, y,
    vx:(Math.random()-0.5)*1.5,
    vy:-(Math.random()*2+1),
    width:Math.random()*4+4,
    height:Math.random()*15+10,
    life:1
  });
}

function addSmoke(x,y){
  smokeParticles.push({
    x, y,
    vx:(Math.random()-0.3)*0.5,
    vy:-(Math.random()*0.5+0.7),
    size:Math.random()*20+15,
    life:Math.random()*1+0.8
  });
}

function drawParticles(){
  // Draw smoke
  smokeParticles.forEach(p=>{
    ctx.globalAlpha = p.life * 0.25;
    let gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
    gradient.addColorStop(0, "rgba(180,180,180,0.3)");
    gradient.addColorStop(1, "rgba(100,100,100,0)");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.004;
  });
  smokeParticles = smokeParticles.filter(p=>p.life>0);

  // Draw fire
  fireParticles.forEach(p=>{
    ctx.globalAlpha = p.life;
    let gradient = ctx.createLinearGradient(p.x, p.y, p.x, p.y - p.height);
    gradient.addColorStop(0, "rgba(255,255,0,0.8)");
    gradient.addColorStop(0.5, "rgba(255,150,0,0.6)");
    gradient.addColorStop(1, "rgba(255,50,0,0.2)");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.width, p.height, 0, 0, Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
  });
  fireParticles = fireParticles.filter(p=>p.life>0);

  ctx.globalAlpha = 1;
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    let totalSpeed = 0;
    let count = 0;

    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name], k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;

          // Fire & smoke per keypoint
          addFire(k.x, k.y);
          addSmoke(k.x, k.y);

          if(speed>6) detectedMovement = true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }

    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }

    // Auto pause jika diam
    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    drawParticles();
    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
