<!DOCTYPE html>
<html>
<head>
  <title>Pose AI STAGE PRO MAX</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:black;
    }

    #container{
      position:relative;
      width:100vw;
      height:100vh;
    }

    video,canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
    }

    canvas{
      z-index:2;
    }

    #hud{
      position:fixed;
      top:20px;
      left:20px;
      z-index:9999;

      background:rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);

      padding:12px;
      border-radius:10px;

      color:#00ffff;
      font-size:13px;
      font-family:monospace;
      line-height:1.5;
    }
  </style>
</head>

<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div id="hud"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let particles = [];
let lastKeypoints = {};

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ width:1280, height:720, facingMode:"user" }
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= SMOOTH =================
function smooth(kp){
  const out = {};
  for(let k in kp){
    if(!lastKeypoints[k]){
      out[k] = kp[k];
    } else {
      out[k] = {
        ...kp[k],
        x: lastKeypoints[k].x * 0.7 + kp[k].x * 0.3,
        y: lastKeypoints[k].y * 0.7 + kp[k].y * 0.3
      };
    }
  }
  lastKeypoints = out;
  return out;
}

// ================= CM =================
const REAL_HEIGHT_CM = 170;

function getBodyHeightPx(kp){
  if(!kp.nose || !kp.left_ankle) return null;
  return Math.abs(kp.nose.y - kp.left_ankle.y);
}

function pxToCm(px, bodyPx){
  if(!px || !bodyPx) return null;
  return (px / bodyPx) * REAL_HEIGHT_CM;
}

// ================= UTILS =================
function sudut(A,B,C){
  if(!A||!B||!C) return null;
  const AB={x:A.x-B.x,y:A.y-B.y};
  const CB={x:C.x-B.x,y:C.y-B.y};
  const dot=AB.x*CB.x+AB.y*CB.y;
  const mag=Math.hypot(AB.x,AB.y)*Math.hypot(CB.x,CB.y);
  return mag ? Math.acos(dot/mag)*(180/Math.PI) : null;
}

function safe(v){
  return (v && !isNaN(v)) ? v.toFixed(1) : '-';
}

function gesture(kp){
  if(!kp.left_wrist || !kp.left_shoulder) return "none";
  return kp.left_wrist.y < kp.left_shoulder.y ? "raise" : "normal";
}

// ================= EMOSI =================
function getEmotion(kp){
  if(!kp.left_shoulder || !kp.right_shoulder) return "unknown";

  const tilt = kp.left_shoulder.y - kp.right_shoulder.y;

  if(Math.abs(tilt) > 40) return "expressive";
  if(kp.nose && kp.nose.y < kp.left_shoulder.y - 100) return "confident";
  if(kp.nose && kp.nose.y > kp.left_shoulder.y + 50) return "low energy";

  return "neutral";
}

// ================= PARTICLE =================
function addParticle(x,y,color){
  if(Math.random() > 0.6) return; // biar tidak terlalu ramai

  particles.push({
    x,y,
    vx:(Math.random()-0.5)*0.5,
    vy:Math.random()*1.5,
    life:1,
    size:Math.random()*3+1,
    color
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
  });

  particles = particles.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= MAIN =================
async function main(){
  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    detector.estimatePoses(video).then(poses=>{

      poses.forEach((pose,i)=>{

        let kp = {};
        pose.keypoints.forEach(k=>kp[k.name]=k);

        kp = smooth(kp);

        const hue = (i*120)%360;
        const g = gesture(kp);
        const emotion = getEmotion(kp);
        const bodyPx = getBodyHeightPx(kp);

        const conn = [
          ['left_shoulder','right_shoulder'],
          ['left_shoulder','left_elbow'],['left_elbow','left_wrist'],
          ['right_shoulder','right_elbow'],['right_elbow','right_wrist'],
          ['left_shoulder','left_hip'],['right_shoulder','right_hip'],
          ['left_hip','right_hip'],
          ['left_hip','left_knee'],['left_knee','left_ankle'],
          ['right_hip','right_knee'],['right_knee','right_ankle']
        ];

        conn.forEach(([a,b])=>{
          if(kp[a]?.score>0.4 && kp[b]?.score>0.4){

            ctx.strokeStyle=`hsl(${hue},100%,60%)`;
            ctx.lineWidth=3;
            ctx.beginPath();
            ctx.moveTo(kp[a].x,kp[a].y);
            ctx.lineTo(kp[b].x,kp[b].y);
            ctx.stroke();

            addParticle(
              (kp[a].x+kp[b].x)/2,
              (kp[a].y+kp[b].y)/2,
              `hsl(${hue},100%,70%)`
            );
          }
        });

        if(i===0){
          hud.innerHTML = `
<b>TINGGI (CM)</b><br>
Bahu: ${safe(pxToCm(kp.left_shoulder?.y, bodyPx))}<br>
Pinggul: ${safe(pxToCm(kp.left_hip?.y, bodyPx))}<br><br>

<b>SUDUT</b><br>
Siku Kiri: ${safe(sudut(kp.left_shoulder,kp.left_elbow,kp.left_wrist))}<br>
Siku Kanan: ${safe(sudut(kp.right_shoulder,kp.right_elbow,kp.right_wrist))}<br><br>

<b>EMOSI</b><br>${emotion}<br><br>

<b>GESTURE</b><br>${g}
`;
        }

      });

    });

    drawParticles();
    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>

</body>
</html>
