<!DOCTYPE html>
<html>
<head>
  <title>Water Body Avoidance - AI Dance</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;
let firstClick = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= PARTICLES =================
class WaterParticle {
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = Math.random()*2 + 3; // gravity
    this.radius = Math.random()*6 + 4;
    this.color = "rgba(0,150,255,0.6)";
    this.active = true;
  }

  update(keypoints){
    if(!this.active) return;

    // collision avoidance
    keypoints.forEach(k=>{
      if(k.score>0.4 && k.name!=="nose" && k.name!=="left_eye" && k.name!=="right_eye"){
        const dx = this.x - k.x;
        const dy = this.y - k.y;
        const dist = Math.hypot(dx,dy);
        if(dist < this.radius+10){ // threshold avoidance
          const angle = Math.atan2(dy,dx);
          const force = 3;
          this.vx += Math.cos(angle)*force;
          this.vy += Math.sin(angle)*force;
        }
      }
    });

    // gravity + small random wind
    this.vy += 0.1;
    this.vx += (Math.random()-0.5)*0.2;

    this.x += this.vx;
    this.y += this.vy;

    // reset if out of screen
    if(this.y > canvas.height){
      this.y = -10;
      this.x = Math.random()*canvas.width;
      this.vx = 0;
      this.vy = Math.random()*2 + 3;
    }
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

let particles = [];
for(let i=0;i<200;i++){
  particles.push(new WaterParticle(Math.random()*1280, Math.random()*720));
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    let totalSpeed = 0;
    let count = 0;
    let keypoints = [];

    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        keypoints.push(k);
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name],k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;
          if(speed>6) detectedMovement = true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }

    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }

    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    // update & draw particles
    particles.forEach(p=>{
      p.update(keypoints);
      p.draw();
    });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
