<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{ margin:0; overflow:hidden; background:black; }
    video, canvas{ position:absolute; width:100%; height:100%; object-fit:contain; }
    video{ transform:scaleX(-1); }
    #hud{
      position:fixed; top:20px; left:20px;
      background:rgba(0,0,0,0.3); padding:12px;
      border-radius:10px; color:#00ffff; font-family:monospace;
    }
    #startBtn{
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%);
      padding:12px 20px; background:#00ffff;
      border:none; border-radius:8px; cursor:pointer;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>
<button id="startBtn">START</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');

let particles = [];
let lastFrame = {};
let energy = 0;

let memoryWords = [];
let lastWordTime = 0;

// ================= NARASI GARBHA =================
const WORDS = [
  "rahim","gelap","sunyi","hangat","cair","denyut","terbungkus","awal","benih",
  "lahir","napas","tangis","cahaya","terbuka","getar","dunia","pertama",
  "peluk","ibu","diam","lembut","dekat","rasa","bergantung",
  "langkah","jatuh","bangun","main","tanya","lihat","belajar","ingin",
  "gelisah","cari","arah","ragu","berubah","melawan","ingin tahu",
  "pilih","jalan","tanggung","beban","cinta","kehilangan","makna","hidup",
  "ingat","ulang","jejak","waktu","arsip","tubuh",
  // variasi refleksi (penting!)
  "hening","diam","pulang","ruang","rasa","nafas","ke dalam"
];

let lifeIndex = 0;

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(intensity){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 180 + intensity * 5;

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:{ideal:1280},height:{ideal:720},facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadedmetadata=()=>{ video.play(); r(); });
}

// ================= WORD SYSTEM =================
function addWord(x, y){

  let word = WORDS[lifeIndex];

  // 🔥 TRANSISI HIDUP (TIDAK BERHENTI DI AKHIR)
  if(Math.random() < 0.1 + energy*0.02){
    lifeIndex++;

    // 🔥 LOOP HALUS (BUKAN RESET KASAR)
    if(lifeIndex >= WORDS.length){
      lifeIndex = Math.floor(WORDS.length * 0.6); // kembali ke fase dewasa
    }
  }

  // 🔥 VARIASI DI FASE AKHIR (ANTI "KESADARAN SPAM")
  if(lifeIndex > WORDS.length - 8){
    word = WORDS[
      Math.floor(Math.random() * 8) + (WORDS.length - 8)
    ];
  }

  // 🔥 MEMORY TANPA BATAS
  if(Date.now() - lastWordTime > 120){
    memoryWords.push(word);
    lastWordTime = Date.now();
  }

  if(particles.length < 300){
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*0.5,
      vy:-Math.random()*1.5 - 0.5,
      text: word,
      size: 10 + energy * 0.8 + Math.random()*10,
      life: 1
    });
  }
}

function drawWords(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${(energy*10 + p.x*0.05)%360},100%,70%)`;
    ctx.font = `${p.size}px monospace`;
    ctx.fillText(p.text, p.x, p.y);

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
  });

  particles = particles.filter(p=>p.life > 0);
  ctx.globalAlpha = 1;
}

// ================= SPEED =================
function getSpeed(prev,curr){
  if(!prev||!curr) return 0;
  return Math.hypot(curr.x-prev.x,curr.y-prev.y);
}

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.globalAlpha = 0.12;
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{
      poses.forEach(pose=>{
        let total=0, count=0;

        pose.keypoints.forEach(k=>{
          if(k.score>0.4){
            let x = canvas.width - k.x;
            let y = k.y;

            addWord(x,y);

            const speed = getSpeed(lastFrame[k.name], {x,y});
            total += speed;
            count++;

            if(speed>12) playSound(speed);

            lastFrame[k.name] = {x,y};
          }
        });

        energy = Math.min(40, total/(count||1));
      });
    });

    drawWords();

    // 🔥 MEMORY VISUAL
    ctx.fillStyle = "white";
    ctx.font = "16px monospace";
    ctx.textAlign = "left";

    const maxLines = 15;
    const wordsPerLine = 10;

    for(let i=0;i<maxLines;i++){
      let slice = memoryWords.slice(-wordsPerLine*(i+1), -wordsPerLine*i || undefined);
      ctx.fillText(slice.join(" "), 20, canvas.height - 20 - (i*18));
    }

    hud.innerHTML = `ENERGI: ${energy.toFixed(2)}<br>ARSIP: ${memoryWords.length}`;

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = async ()=>{
  await audioCtx.resume();
  document.body.requestFullscreen();
  startBtn.style.display="none";
  hud.style.display="none";
  main();
};
</script>

</body>
</html>
