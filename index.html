<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - Fire Particles AI Dance</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;
let firstClick = false;

let particles = [];
let trails = {};

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

// Klik pertama unlock audio
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= PARTICLE & TRAIL =================
function addParticle(x,y){
  particles.push({
    x, y,
    vx:(Math.random()-0.5)*1,
    vy:(Math.random()*-2)-0.5,
    size: Math.random()*6+4,
    life:1,
    colors:[
      `rgba(255,255,0,0.8)`,
      `rgba(255,165,0,0.6)`,
      `rgba(255,0,0,0.4)`
    ]
  });
}

function drawParticles(){
  particles.forEach(p=>{
    // Gradient api
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
    grd.addColorStop(0, p.colors[0]);
    grd.addColorStop(0.5, p.colors[1]);
    grd.addColorStop(1, p.colors[2]);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.01;
  });
  particles = particles.filter(p=>p.life>0);
}

function updateTrail(name,x,y){
  if(!trails[name]) trails[name]=[];
  trails[name].push({x,y});
  if(trails[name].length>20) trails[name].shift();
}

function drawTrails(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach((p,i)=>{
      if(i===0) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle="rgba(255,100,0,0.6)"; // neon fire trail
    ctx.lineWidth=2;
    ctx.stroke();
  });
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    let totalSpeed = 0;
    let count = 0;

    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        if(k.score > 0.4){
          const speed = getSpeed(lastFrame[k.name], k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;

          // 🔥 Particle & Trail
          addParticle(k.x,k.y);
          updateTrail(k.name,k.x,k.y);

          if(speed > 6) detectedMovement = true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }

    // PlaybackRate mengikuti kecepatan gerak
    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }

    // Auto pause jika diam > 800ms
    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    drawParticles();
    drawTrails();

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
