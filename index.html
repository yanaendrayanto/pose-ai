<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE – Ultra Realistic Rain</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let firstClick = false;
let lastMoveTime = 0;
let isPlaying = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(res=>video.onloadeddata=res);
}

// ================= RAIN PARTICLES =================
let rainParticles = [];
function spawnRain(){
  for(let i=0;i<5;i++){ // spawn 5 per frame
    rainParticles.push({
      x: Math.random()*canvas.width,
      y: -10,
      vy: Math.random()*6+4,
      length: Math.random()*20+10,
      splashed: false,
      opacity: Math.random()*0.3 + 0.3
    });
  }
}

function drawRain(poses){
  rainParticles.forEach(p=>{
    // cek interaksi dengan tubuh
    let hitBody=false;
    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        if(k.score>0.4 && k.y>video.videoHeight*0.3){ // hindari wajah
          const dx = k.x - p.x;
          const dy = k.y - p.y;
          if(Math.hypot(dx,dy) < 15){ 
            hitBody = true;
          }
        }
      });
    });

    if(hitBody && !p.splashed){
      // percikan dramatis
      for(let j=0;j<4;j++){
        rainParticles.push({
          x: p.x,
          y: p.y,
          vy: Math.random()*2 - 1,
          length: Math.random()*10+5,
          splashed: true,
          opacity: Math.random()*0.5+0.3
        });
      }
      p.splashed=true;
    }

    // gambar hujan
    const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.length);
    grad.addColorStop(0, `rgba(200,220,255,0)`);
    grad.addColorStop(0.5, `rgba(200,220,255,${p.opacity})`);
    grad.addColorStop(1, `rgba(180,200,255,0.7)`);

    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x, p.y + p.length);
    ctx.stroke();

    p.y += p.vy;
  });

  rainParticles = rainParticles.filter(p=>p.y<canvas.height+20);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement=false;
    let totalSpeed=0, count=0;

    poses.forEach(p=>{
      p.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name],k);
          lastFrame[k.name]=k;
          totalSpeed+=speed;
          count++;
          if(speed>6) detectedMovement=true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio responsive
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying=true;
      }
    }
    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }
    if(isPlaying && Date.now()-lastMoveTime>800){
      garbha.pause();
      isPlaying=false;
    }

    spawnRain();
    drawRain(poses);

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
