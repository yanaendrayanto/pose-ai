<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let detectedMovement = false;
let lastMoveTime = 0;
let isPlaying = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

// Klik pertama untuk unlock audio
let firstClick = false;
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    detector.estimatePoses(video).then(poses=>{
      poses.forEach(pose=>{
        let kp = {};
        pose.keypoints.forEach(k=>kp[k.name]=k);
        Object.entries(kp).forEach(([name,k])=>{
          if(k.score>0.4){
            const speed = getSpeed(lastFrame[name],k);
            if(speed>6) detectedMovement = true;
            lastFrame[name] = k;
          }
        });
      });

      // 🔥 Audio logic
      if(detectedMovement && firstClick){
        lastMoveTime = Date.now();
        if(!isPlaying){
          garbha.play().catch(e=>console.log(e));
          isPlaying = true;
        }
      }

      // Pause jika diam > 800ms
      if(isPlaying && Date.now() - lastMoveTime > 800){
        garbha.pause();
        isPlaying = false;
      }

      detectedMovement = false;
    });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
