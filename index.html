<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
    }
    #hud{
      position:fixed;
      top:20px;
      left:20px;
      z-index:9999;
      background:rgba(0,0,0,0.3);
      padding:12px;
      border-radius:10px;
      color:#00ffff;
      font-family:monospace;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let particles = [];
let trails = {};
let historyData = [];
let faceLandmarks = [];

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(intensity){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 200 + intensity*500;
  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

// ================= SMOKE PARTICLE =================
function addSmoke(x,y){
  particles.push({
    x,y,
    vx:(Math.random()-0.5)*1,
    vy:(Math.random()-1)*1.5,
    size:Math.random()*8+4,
    life:1
  });
}

function drawSmoke(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = "rgba(0,255,255,0.2)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.01;
  });

  particles = particles.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= TRAIL =================
function updateTrail(name,x,y){
  if(!trails[name]) trails[name]=[];
  trails[name].push({x,y});

  if(trails[name].length>20){
    trails[name].shift();
  }
}

function drawTrail(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach((p,i)=>{
      ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle="rgba(0,255,255,0.3)";
    ctx.lineWidth=2;
    ctx.stroke();
  });
}

// ================= MOTION =================
function getSpeed(prev, curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // 🔥 TAMBAHKAN DI SINI
  const FACE_68_INDEX = [
    10,338,297,332,284,251,389,356,454,323,
    361,288,397,365,379,378,400,377,152,148,
    176,149,150,136,172,58,132,93,234,127,
    162,21,54,103,67,109,10,338,297,332,
    284,251,389,356,454,323,361,288,397,365,
    379,378,400,377,152,148,176,149,150,136,
    172,58,132,93,234,127,162,21,54,103
  ];

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  // ================= FACE MESH =================
const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

faceMesh.onResults(results => {
  if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0){
    faceLandmarks = results.multiFaceLandmarks[0];
  }
});

  let lastFrame = {};

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ✅ tampilkan video (AMAN)
  if(video.readyState >= 2 && video.videoWidth > 0){
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
  }

  // ================= FACE 68 POINT =================
  if(faceLandmarks.length > 0){
    ctx.fillStyle = "rgba(255,0,255,0.8)";

    FACE_68_INDEX.forEach(i => {
      const p = faceLandmarks[i];
      if(p){
        const x = p.x * canvas.width;
        const y = p.y * canvas.height;

        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  // ================= POSE =================
  detector.estimatePoses(video).then(poses=>{

    poses.forEach(pose=>{

      let kp = {};
      pose.keypoints.forEach(k=>kp[k.name]=k);

      Object.entries(kp).forEach(([name,k])=>{

        if(k.score>0.4){

          updateTrail(name,k.x,k.y);
          addSmoke(k.x,k.y);

          const speed = getSpeed(lastFrame[name],k);

          if(speed>10){
            playSound(speed/50);
          }

          lastFrame[name] = k;
        }

      });

      // SAVE JSON FRAME
      historyData.push({
        time: Date.now(),
        keypoints: kp
      });

    });

  });

  drawTrail();
  drawSmoke();

  // ✅ update FaceMesh (AMAN & STABIL)
  if(video.readyState >= 2 && video.videoWidth > 0){
    faceMesh.send({image: video});
  }

  requestAnimationFrame(draw);
}

  draw();
}

main();

// ================= EXPORT =================
window.addEventListener('keydown', e=>{
  if(e.key === 's'){
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(historyData));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", "dance_data.json");
    dl.click();
  }
});
</script>

</body>
</html>
