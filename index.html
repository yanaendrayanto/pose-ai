<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <style>
    body{margin:0;overflow:hidden;background:black;}

    video,canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
      transform:scaleX(-1);
    }

    #hud{
      position:fixed;
      top:20px;
      left:20px;
      z-index:9999;
      background:rgba(0,0,0,0.3);
      padding:12px;
      border-radius:10px;
      color:#00ffff;
      font-family:monospace;
    }

    #startBtn{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>
<button id="startBtn">START</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');

let particles = [];
let trails = {};
let lastFrame = {};
let energy = 0;

// ================= FACE =================
let faceMesh;
let facePoints = [];
let frameSkip = 0;

// 🔥 EXPRESSION
let isMouthOpen = false;
let isSmiling = false;

// 🔥 68 LANDMARK
const FACE_68 = [
  10,338,297,332,284,251,389,356,
  454,323,361,288,397,365,379,378,
  400,377,152,148,176,149,150,136,
  172,58,132,93,234,127,162,21,
  33,7,163,144,145,153,154,155,
  263,249,390,373,374,380,381,382,
  1,2,98,327,168,197,
  61,146,91,181,84,17,314,405,
  321,375,291,308
];

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(intensity){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 200 + intensity * 10;
  gain.gain.value = 0.1;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:{ideal:1280},height:{ideal:720},facingMode:"user"}
  });

  video.srcObject = stream;

  return new Promise(resolve=>{
    video.onloadedmetadata = ()=>{
      video.play();
      resolve();
    };
  });
}

// ================= PARTICLE =================
function addSmoke(x,y){
  particles.push({
    x,y,
    vx:(Math.random()-0.5)*1.5,
    vy:(Math.random()-1)*1.2,
    size:Math.random()*6 + energy*0.05,
    life:1
  });
}

function drawSmoke(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = "rgba(0,255,255,0.25)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
  });

  particles = particles.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= TRAIL =================
function updateTrail(name,x,y){
  if(!trails[name]) trails[name]=[];
  trails[name].push({x,y});
  if(trails[name].length>15) trails[name].shift();
}

function drawTrail(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle="rgba(0,255,255,0.3)";
    ctx.stroke();
  });
}

// ================= SPEED =================
function getSpeed(prev, curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= FACE =================
function drawFace(){

  if(!facePoints || facePoints.length === 0) return;

  let maxPoints = energy > 15 ? 20 : 50;

  FACE_68.slice(0, maxPoints).forEach(i=>{
    const p = facePoints[i];
    if(!p) return;

    const x = p.x * canvas.width;
    const y = p.y * canvas.height;

    ctx.fillStyle = `hsl(${energy*5},100%,60%)`;
    ctx.beginPath();
    ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fill();
  });
}

// ================= EXPRESSION =================
function detectExpression(){

  if(!facePoints || facePoints.length === 0) return;

  const topLip = facePoints[13];
  const bottomLip = facePoints[14];
  const leftMouth = facePoints[61];
  const rightMouth = facePoints[291];

  if(!topLip || !bottomLip) return;

  const mouthOpen = Math.abs(topLip.y - bottomLip.y);
  isMouthOpen = mouthOpen > 0.035;

  const smileWidth = Math.abs(leftMouth.x - rightMouth.x);
  isSmiling = smileWidth > 0.28;
}

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
  );

  faceMesh = new FaceMesh({
    locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:false
  });

  faceMesh.onResults(results=>{
    if(results.multiFaceLandmarks.length > 0){
      facePoints = results.multiFaceLandmarks[0];
    }
  });

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    detector.estimatePoses(video).then(poses=>{
      poses.forEach(pose=>{
        let total = 0;
        let count = 0;

        pose.keypoints.forEach(k=>{
          if(k.score>0.4){
            updateTrail(k.name,k.x,k.y);
            addSmoke(k.x,k.y);

            const speed = getSpeed(lastFrame[k.name],k);
            total += speed;
            count++;

            if(speed>12){
              playSound(speed);
            }

            lastFrame[k.name] = k;
          }
        });

        energy = total / (count || 1);
      });
    });

    // FACE
    frameSkip++;
    if(frameSkip % 5 === 0 && energy < 20){
      setTimeout(()=>{
        faceMesh.send({image: video});
      }, 0);
    }

    drawTrail();
    drawSmoke();
    drawFace();
    detectExpression();

    // ================= REACTION =================

    // 😄 SENYUM → visual glow
    if(isSmiling){
      ctx.fillStyle = "rgba(255,200,0,0.08)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // 😮 MULUT → sound trigger
    if(isMouthOpen){
      playSound(15);
    }

    hud.innerHTML = `
      ENERGY: ${energy.toFixed(2)} <br>
      SMILE: ${isSmiling} <br>
      MOUTH: ${isMouthOpen}
    `;

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = async ()=>{
  await audioCtx.resume();
  startBtn.style.display = "none";
  main();
};
</script>

</body>
</html>
