<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GARBHA MODE - Kamera Stabil</title>
<style>
body{margin:0;overflow:hidden;background:black;}
video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

// Audio
const garbha=new Audio("garbha.mp3");
garbha.loop=true;
let firstClick=false;
window.addEventListener('click',()=>{if(firstClick) return; firstClick=true; garbha.play().catch(e=>console.log(e));});

// Setup Camera
async function setupCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:"user"}});
  video.srcObject=stream;
  return new Promise(r=>video.onloadedmetadata=r);
}

// Partikel sederhana
let particles=[];
function addParticle(x,y,color){particles.push({x,y,vx:(Math.random()-0.5)*1,vy:(Math.random()*-2-1),life:1,color});}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,2*Math.PI);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=0.02;});particles=particles.filter(p=>p.life>0);ctx.globalAlpha=1;}

// Main
async function main(){
  await setupCamera();
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    // Tambahkan partikel demo di tengah
    addParticle(canvas.width/2,canvas.height/2,"orange");
    drawParticles();

    requestAnimationFrame(draw);
  }

  draw();
}
main();
</script>
</body>
</html>
