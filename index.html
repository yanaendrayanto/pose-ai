<!DOCTYPE html>
<html>
<head>
  <title>Heavy Rain with Head Tracking + Audio</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let particles = [];
let firstClick = false;
let isPlaying = false;
let lastMoveTime = 0;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

window.addEventListener('click', async ()=>{
  if(firstClick) return;
  firstClick = true;
  try{
    await garbha.play(); // unlock audio
    isPlaying = true;
  }catch(e){console.log("Audio play error:", e);}
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= PARTICLE =================
class Particle{
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*0.3;
    this.vy = Math.random()*8 + 4;
    this.size = Math.random()*2 + 2;
    this.alpha = Math.random()*0.5 + 0.5;
  }
  update(bodyBounds){
    let insideBody = bodyBounds.some(b=>{
      return this.x > b.x1 && this.x < b.x2 && this.y > b.y1 && this.y < b.y2;
    });
    if(insideBody){
      const shift = (Math.random()<0.5? -1 : 1) * 50;
      this.x += shift;
      this.y -= 10;
    }

    this.x += this.vx;
    this.y += this.vy;

    if(this.y > canvas.height) this.y = -10;
    if(this.x < 0) this.x = canvas.width;
    if(this.x > canvas.width) this.x = 0;
  }
  draw(ctx){
    ctx.fillStyle = `rgba(0,180,255,${this.alpha})`;
    ctx.fillRect(this.x,this.y,this.size,this.size*3);
  }
}

// ================= BODY AREA =================
function getBodyBounds(poses){
  let bounds = [];
  poses.forEach(p=>{
    const keypoints = p.keypoints.filter(k=>k.score>0.4);
    const relevant = keypoints.filter(k=>{
      // Semua bagian kepala sampai kaki
      const order = [
        'nose','left_eye','right_eye','left_ear','right_ear','left_shoulder','right_shoulder',
        'left_elbow','right_elbow','left_wrist','right_wrist','left_hip','right_hip',
        'left_knee','right_knee','left_ankle','right_ankle'
      ];
      const index = order.indexOf(k.name);
      return index >= 0;
    });

    if(relevant.length){
      const xVals = relevant.map(k=>k.x);
      const yVals = relevant.map(k=>k.y);
      bounds.push({
        x1: Math.min(...xVals),
        x2: Math.max(...xVals),
        y1: Math.min(...yVals),
        y2: Math.max(...yVals)
      });
    }
  });
  return bounds;
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  // Buat hujan
  for(let i=0;i<2000;i++){
    particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height));
  }

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    const bodyBounds = getBodyBounds(poses);

    // Partikel update & draw
    let totalSpeed = 0;
    let count = 0;
    let detectedMovement = false;

    poses.forEach(p=>{
      p.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name], k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;
          if(speed>6) detectedMovement = true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    particles.forEach(p=>{
      p.update(bodyBounds);
      p.draw(ctx);
    });

    // 🔊 Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }

    // PlaybackRate menyesuaikan gerakan
    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }

    // Auto pause jika diam > 800ms
    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
