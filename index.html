<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE – Inferno Extreme Light Smoke</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;
let firstClick = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(res=>video.onloadeddata=res);
}

// ================= PARTICLES =================
let fireParticles = [];
let smokeParticles = [];

function spawnFire(px,py){
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.3;
  const speed = Math.random()*3 + 2;
  fireParticles.push({
    x:px, y:py,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    life:1,
    width: Math.random()*6+4,
    height: Math.random()*25+15,
    angleRot: Math.random()*Math.PI*2
  });
}

function spawnSmoke(px,py){
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.4;
  const speed = Math.random()*1+0.3;
  smokeParticles.push({
    x:px, y:py,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    life:1,
    width: Math.random()*15+10,    // lebih kecil
    height: Math.random()*20+15,   // lebih kecil
    angleRot: Math.random()*Math.PI*2
  });
}

function drawParticles(){
  // smoke tipis
  smokeParticles.forEach(p=>{
    const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.width);
    grad.addColorStop(0, `rgba(180,180,180,${p.life*0.2})`);
    grad.addColorStop(0.8, `rgba(120,120,120,${p.life*0.05})`);
    grad.addColorStop(1, `rgba(100,100,100,0)`);
    ctx.fillStyle = grad;
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angleRot);
    ctx.beginPath();
    ctx.ellipse(0,0,p.width*0.5,p.height,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    p.x += p.vx*0.4;
    p.y += p.vy*0.5;
    p.life -= 0.003; // lebih lambat hilangnya
  });
  smokeParticles = smokeParticles.filter(p=>p.life>0);

  // fire
  fireParticles.forEach(p=>{
    const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y - p.height);
    grad.addColorStop(0, `rgba(255,255,180,${p.life})`);
    grad.addColorStop(0.3, `rgba(255,180,50,${p.life*0.8})`);
    grad.addColorStop(0.6, `rgba(255,100,0,${p.life*0.6})`);
    grad.addColorStop(1, `rgba(120,0,0,${p.life*0.3})`);
    ctx.fillStyle = grad;
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angleRot);
    ctx.beginPath();
    ctx.ellipse(0, -p.height/2, p.width*0.5, p.height, 0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    p.x += p.vx;
    p.y += p.vy;
    p.angleRot += (Math.random()-0.5)*0.05;
    p.life -= 0.012;
  });
  fireParticles = fireParticles.filter(p=>p.life>0);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement=false;
    let totalSpeed=0,count=0;

    poses.forEach(p=>{
      p.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name],k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;

          if(k.y > video.videoHeight*0.3){ // hindari area wajah
            spawnFire(k.x, k.y + speed*0.15);
            spawnSmoke(k.x, k.y + speed*0.12);
          }

          if(speed>6) detectedMovement=true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // audio responsive
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying=true;
      }
    }
    if(isPlaying){
      garbha.playbackRate = Math.min(2.2,Math.max(1,1+avgSpeed/12));
    }
    if(isPlaying && Date.now()-lastMoveTime>800){
      garbha.pause();
      isPlaying=false;
    }

    drawParticles();
    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
