<!DOCTYPE html>
<html>
<head>
  <title>Pose Estimation Capture JPG</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <style>
    body { display:flex; flex-direction:row; align-items:flex-start; font-family:sans-serif; background:#f0f0f0; margin:20px;}
    #container { position:relative; width:480px; height:480px; border:1px solid #ccc; }
    video, canvas { width:480px; height:480px; display:block; }
    canvas { position:absolute; top:0; left:0; pointer-events:none; }
    #output { background:#eee; padding:10px; margin-left:20px; width:220px; white-space:pre-wrap; font-size:14px; }
    #capture { position:fixed; top:20px; right:20px; z-index:100; padding:10px 20px; font-size:16px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; }
    #capture:hover { background:#218838; }
  </style>
</head>
<body>
<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas" width="480" height="480"></canvas>
</div>
<pre id="output"></pre>
<button id="capture">Capture Pose (JPG)</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const output = document.getElementById('output');
const captureBtn = document.getElementById('capture');

const videoWidth = 480;
const videoHeight = 480;
const userHeightCm = 170;
const smoothingFrames = 5;

const connections = [
  ['nose','left_eye'], ['nose','right_eye'],
  ['left_shoulder','right_shoulder'],
  ['left_shoulder','left_elbow'], ['left_elbow','left_wrist'],
  ['right_shoulder','right_elbow'], ['right_elbow','right_wrist'],
  ['left_shoulder','left_hip'], ['right_shoulder','right_hip'],
  ['left_hip','right_hip'],
  ['left_hip','left_knee'], ['left_knee','left_ankle'],
  ['right_hip','right_knee'], ['right_knee','right_ankle']
];

// Kamera
async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: videoWidth, height: videoHeight },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
}

// smoothing
function smoothValue(history,val){
  history.push(val);
  if(history.length>smoothingFrames) history.shift();
  return history.reduce((a,b)=>a+b,0)/history.length;
}

// sudut
function getAngle(A,B,C){
  if(!A||!B||!C) return 0;
  const AB = {x:A.x-B.x,y:A.y-B.y};
  const CB = {x:C.x-B.x,y:C.y-B.y};
  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);
  return Math.acos(dot/(magAB*magCB))*(180/Math.PI);
}

// gambar skeleton
function drawPose(keypoints){
  const mirrorX = x => videoWidth - x;

  ctx.strokeStyle='blue';
  ctx.lineWidth=3;

  connections.forEach(pair=>{
    const kp1=keypoints.find(k=>k.name===pair[0]);
    const kp2=keypoints.find(k=>k.name===pair[1]);
    if(kp1 && kp2 && kp1.score>0.3 && kp2.score>0.3){
      ctx.beginPath();
      ctx.moveTo(mirrorX(kp1.x),kp1.y);
      ctx.lineTo(mirrorX(kp2.x),kp2.y);
      ctx.stroke();
    }
  });

  keypoints.forEach(k=>{
    if(k.score>0.3){
      ctx.beginPath();
      ctx.arc(mirrorX(k.x),k.y,5,0,2*Math.PI);
      ctx.fillStyle='red';
      ctx.fill();
    }
  });
}

function yToCm(y,minY,maxY){
  return (y-minY)*userHeightCm/(maxY-minY);
}

async function main(){
  await setupCamera();

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER }
  );

  const smoothHistory={};
  const logFrames={};

  async function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // video mirror
    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-videoWidth,0,videoWidth,videoHeight);
    ctx.restore();

    const poses = await detector.estimatePoses(video,{flipHorizontal:true});

    if(poses.length>0){
      const keypoints = poses[0].keypoints;
      drawPose(keypoints);

      const validY = keypoints.filter(k=>k.score>0.3).map(k=>k.y);
      const minY=Math.min(...validY);
      const maxY=Math.max(...validY);

      const kp=name=>keypoints.find(k=>k.name===name);

      const heights={
        kepala: yToCm(smoothValue(smoothHistory.kepala||=[],kp('nose')?.y||0),minY,maxY),
        bahuKiri: yToCm(smoothValue(smoothHistory.bk||=[],kp('left_shoulder')?.y||0),minY,maxY),
        bahuKanan: yToCm(smoothValue(smoothHistory.bn||=[],kp('right_shoulder')?.y||0),minY,maxY)
      };

      const angles={
        sikuKiri: getAngle(kp('left_shoulder'),kp('left_elbow'),kp('left_wrist')),
        sikuKanan: getAngle(kp('right_shoulder'),kp('right_elbow'),kp('right_wrist'))
      };

      output.textContent = `
Ketinggian (cm)
Kepala: ${heights.kepala.toFixed(1)}
Bahu Kiri: ${heights.bahuKiri.toFixed(1)}
Bahu Kanan: ${heights.bahuKanan.toFixed(1)}

Sudut (°)
Siku Kiri: ${angles.sikuKiri.toFixed(1)}
Siku Kanan: ${angles.sikuKanan.toFixed(1)}
      `;

      logFrames[Date.now()]={heights,angles};
    } else {
      output.textContent="Pose belum terdeteksi";
    }

    requestAnimationFrame(loop);
  }

  loop();

  captureBtn.onclick=()=>{
    const tempCanvas=document.createElement('canvas');
    const tempCtx=tempCanvas.getContext('2d');

    const width=videoWidth+output.offsetWidth;
    const height=videoHeight;

    tempCanvas.width=width;
    tempCanvas.height=height;

    tempCtx.fillStyle="#f0f0f0";
    tempCtx.fillRect(0,0,width,height);

    tempCtx.save();
    tempCtx.scale(-1,1);
    tempCtx.drawImage(video,-videoWidth,0,videoWidth,videoHeight);
    tempCtx.restore();

    tempCtx.drawImage(canvas,0,0);

    tempCtx.fillStyle="black";
    tempCtx.font="14px sans-serif";

    output.textContent.split("\n").forEach((line,i)=>{
      tempCtx.fillText(line,videoWidth+10,20+i*18);
    });

    const link=document.createElement('a');
    link.download="pose.jpg";
    link.href=tempCanvas.toDataURL("image/jpeg");
    link.click();
  };
}

main();
</script>
</body>
</html>
