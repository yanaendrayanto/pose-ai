<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE – Full Body Fire & Smoke</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
// ================= SETUP =================
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;
let firstClick = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

// unlock audio on first click
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:",e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(res=>video.onloadeddata=res);
}

// ================= PARTICLES =================
let fireParticles = [];
let smokeParticles = [];

// generate fire particle
function spawnFire(px,py){
  fireParticles.push({
    x:px,
    y:py,
    vx:(Math.random()-0.5)*1.2,
    vy:-(Math.random()*3+1),
    life:1,
    size: Math.random()*12+8,
    angle:Math.random()*Math.PI*2
  });
}

// generate smoke particle
function spawnSmoke(px,py){
  smokeParticles.push({
    x:px,
    y:py,
    vx:(Math.random()-0.3)*0.6,
    vy:-(Math.random()*1.5+0.6),
    life:1,
    size: Math.random()*40+30,
    angle:Math.random()*Math.PI*2
  });
}

// draw particles
function drawParticles(){
  // smoke first (back)
  smokeParticles.forEach(p=>{
    // ellipse with radial gradient
    const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    grad.addColorStop(0, `rgba(180,180,180,${p.life*0.4})`);
    grad.addColorStop(0.8, `rgba(100,100,100,${p.life*0.1})`);
    grad.addColorStop(1, `rgba(100,100,100,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,p.size*0.6,p.size,0,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx*0.3;
    p.y += p.vy*0.5;
    p.life -= 0.005;
  });
  smokeParticles = smokeParticles.filter(p=>p.life>0);

  // fire
  fireParticles.forEach(p=>{
    const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y - p.size*1.2);
    grad.addColorStop(0, `rgba(255,240,50,${p.life})`);
    grad.addColorStop(0.4, `rgba(255,120,0,${p.life*0.7})`);
    grad.addColorStop(1, `rgba(180,0,0,${p.life*0.3})`);
    ctx.fillStyle = grad;

    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);
    ctx.beginPath();
    ctx.ellipse(0,0,p.size*0.6,p.size,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    p.x += p.vx;
    p.y += p.vy;
    p.angle += (Math.random()-0.5)*0.06;
    p.life -= 0.01;
  });

  fireParticles = fireParticles.filter(p=>p.life>0);
}

// ================= MOTION HELPERS =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);

    let detectedMovement=false;
    let totalSpeed=0,count=0;

    poses.forEach(p=>{
      p.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name],k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;

          // ** Avoid face region **
          if(k.y > video.videoHeight*0.3){
            // spawn fire + smoke at torso/limbs
            spawnFire(k.x, k.y + (speed*0.1));
            spawnSmoke(k.x, k.y + (speed*0.08));
          }

          if(speed>6) detectedMovement=true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying=true;
      }
    }
    if(isPlaying){
      // smooth playback shift
      garbha.playbackRate = Math.min(2,Math.max(1,1+avgSpeed/12));
    }
    if(isPlaying && Date.now()-lastMoveTime>800){
      garbha.pause();
      isPlaying=false;
    }

    // draw particles
    drawParticles();

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
