<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
    }
    #hud{
      position:fixed;
      top:20px;
      left:20px;
      z-index:9999;
      background:rgba(0,0,0,0.3);
      padding:12px;
      border-radius:10px;
      color:#00ffff;
      font-family:monospace;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let particles = [];
let trails = {};
let historyData = [];

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = false;

// aktifkan audio setelah klik (biar tidak diblok browser)
window.addEventListener('click', ()=>{
  garbha.play();
  garbha.pause(); // preload saja
});

// ================= SMOKE PARTICLE =================
function addSmoke(x,y){
  particles.push({
    x,y,
    vx:(Math.random()-0.5)*1,
    vy:(Math.random()-1)*1.5,
    size:Math.random()*8+4,
    life:1
  });
}

function drawSmoke(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = "rgba(0,255,255,0.2)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.01;
  });

  particles = particles.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= TRAIL =================
function updateTrail(name,x,y){
  if(!trails[name]) trails[name]=[];
  trails[name].push({x,y});

  if(trails[name].length>20){
    trails[name].shift();
  }
}

function drawTrail(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach((p,i)=>{
      ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle="rgba(0,255,255,0.3)";
    ctx.lineWidth=2;
    ctx.stroke();
  });
}

// ================= MOTION =================
function getSpeed(prev, curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  let lastFrame = {};

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    detector.estimatePoses(video).then(poses=>{

      poses.forEach(pose=>{

        let kp = {};
        pose.keypoints.forEach(k=>kp[k.name]=k);

        Object.entries(kp).forEach(([name,k])=>{

          if(k.score>0.4){

            updateTrail(name,k.x,k.y);
            addSmoke(k.x,k.y);

            const speed = getSpeed(lastFrame[name],k);

            if(speed > 10){
            garbha.currentTime = 0;
            garbha.play();
          }

            lastFrame[name] = k;
          }

        });

        // SAVE JSON FRAME
        historyData.push({
          time: Date.now(),
          keypoints: kp
        });

      });

    });

    drawTrail();
    drawSmoke();

    requestAnimationFrame(draw);
  }

  draw();
}

main();

// ================= EXPORT =================
window.addEventListener('keydown', e=>{
  if(e.key === 's'){
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(historyData));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", "dance_data.json");
    dl.click();
  }
});
</script>

</body>
</html>
