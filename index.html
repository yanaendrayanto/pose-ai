<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let detectedMovement = false;
let lastMoveTime = 0;
let isPlaying = false;

let particles = [];
let trails = {};
let historyData = [];

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

let firstClick = false;
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= TRAIL & SMOKE =================
function updateTrail(name,x,y){
  if(!trails[name]) trails[name] = [];
  trails[name].push({x,y});
  if(trails[name].length > 20) trails[name].shift();
}

function drawTrail(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach((p,i)=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle="rgba(0,255,255,0.3)";
    ctx.lineWidth=2;
    ctx.stroke();
  });
}

function addSmoke(x,y){
  particles.push({
    x,y,
    vx:(Math.random()-0.5)*1,
    vy:(Math.random()-1)*1.5,
    size:Math.random()*8+4,
    life:1
  });
}

function drawSmoke(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle="rgba(0,255,255,0.2)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    p.x += p.vx; p.y += p.vy; p.life -= 0.01;
  });
  particles = particles.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    detector.estimatePoses(video).then(poses=>{
      let totalSpeed = 0, count = 0;

      poses.forEach(pose=>{
        let kp = {};
        pose.keypoints.forEach(k=>kp[k.name]=k);

        Object.entries(kp).forEach(([name,k])=>{
          if(k.score>0.4){
            updateTrail(name,k.x,k.y);
            addSmoke(k.x,k.y);

            const speed = getSpeed(lastFrame[name],k);
            if(speed>6) detectedMovement = true;
            totalSpeed += speed;
            count++;
            lastFrame[name] = k;
          }
        });

        historyData.push({time: Date.now(), keypoints: kp});
      });

      // 🔥 Audio logic
      if(detectedMovement && firstClick){
        lastMoveTime = Date.now();
        if(!isPlaying){
          garbha.play().catch(e=>console.log(e));
          isPlaying = true;
        }
      }

      // PlaybackRate dinamis sesuai speed rata-rata
      if(isPlaying && count>0){
        const avgSpeed = totalSpeed/count;
        garbha.playbackRate = Math.min(2, 1 + avgSpeed/10);
      }

      // Pause jika diam > 800ms
      if(isPlaying && Date.now() - lastMoveTime > 800){
        garbha.pause();
        isPlaying = false;
      }

      detectedMovement = false;
    });

    drawTrail();
    drawSmoke();

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
