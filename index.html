<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - Pixel Water Stable</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let faceLandmarks = null;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;
let firstClick = false;
let isPlaying = false;
let lastMoveTime = 0;

window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(()=>{});
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= PARTICLE =================
class Particle{
  constructor(x,y){
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*0.5;
    this.vy=Math.random()*2+2;
    this.size=Math.random()*4+2;
  }
  update(avoid=[]){
    avoid.forEach(pt=>{
      const dx=pt.x-this.x;
      const dy=pt.y-this.y;
      const dist=Math.hypot(dx,dy);
      if(dist<30){ this.x-=dx*0.05; this.y-=dy*0.05; }
    });
    this.x+=this.vx; this.y+=this.vy;
    if(this.y>canvas.height){ this.y=-this.size; this.x=Math.random()*canvas.width; }
  }
  draw(){ ctx.fillStyle="rgba(0,150,255,0.6)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
}

const particles=[];
for(let i=0;i<200;i++) particles.push(new Particle(Math.random()*1280,Math.random()*720));

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  const faceMesh = new FaceMesh({
    locateFile: file=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
  faceMesh.onResults(results=>{
    if(results.multiFaceLandmarks.length>0) faceLandmarks=results.multiFaceLandmarks[0];
  });

  // kirim frame FaceMesh tiap 200ms (cukup untuk tracking wajah)
  setInterval(()=>faceMesh.send({image:video}),200);

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement=false, totalSpeed=0, count=0;
    let bodyPoints=[];

    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed=lastFrame[k.name]?Math.hypot(k.x-lastFrame[k.name].x,k.y-lastFrame[k.name].y):0;
          if(speed>3) detectedMovement=true;
          totalSpeed+=speed; count++;
          lastFrame[k.name]=k;
          bodyPoints.push({x:k.x, y:k.y});
        }
      });
    });

    if(faceLandmarks){
      faceLandmarks.slice(0,64).forEach(pt=>{
        bodyPoints.push({x:pt.x*canvas.width, y:pt.y*canvas.height});
      });
    }

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio
    if(detectedMovement && firstClick){ lastMoveTime=Date.now(); if(!isPlaying){ garbha.play().catch(()=>{}); isPlaying=true; } }
    if(isPlaying){ garbha.playbackRate=Math.min(2,Math.max(1,1+avgSpeed/10)); }
    if(isPlaying && Date.now()-lastMoveTime>800){ garbha.pause(); isPlaying=false; }

    // Particles
    particles.forEach(p=>{ p.update(bodyPoints); p.draw(); });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
