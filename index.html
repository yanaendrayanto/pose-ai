<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - Api & Asap Realistis</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;
let firstClick = false;

let particles = [];
let trails = {};

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;

window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= PARTICLE & TRAIL =================
function addParticles(x,y){
  // 🔥 Fire particle (oblong, seperti lidah api)
  for(let i=0;i<2;i++){
    const angle = Math.random()*Math.PI/6 - Math.PI/12; // kecil miring ke atas
    const speed = Math.random()*3+1;
    particles.push({
      x, y,
      vx: Math.sin(angle)*speed,
      vy: -(Math.cos(angle)*speed),
      width: Math.random()*4+2,
      height: Math.random()*10+8,
      life:1,
      type:"fire",
      colors:["rgba(255,255,0,0.8)","rgba(255,140,0,0.6)","rgba(255,0,0,0.4)"]
    });
  }

  // 💨 Smoke particle (abu-abu)
  for(let i=0;i<1;i++){
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*0.5,
      vy:(Math.random()*-2)-0.2,
      width: Math.random()*8+4,
      height: Math.random()*12+6,
      life:1,
      type:"smoke",
      colors:["rgba(100,100,100,0.2)","rgba(150,150,150,0.15)","rgba(200,200,200,0.05)"]
    });
  }
}

function drawParticles(){
  particles.forEach(p=>{
    const grd = ctx.createLinearGradient(p.x, p.y, p.x, p.y - p.height);
    grd.addColorStop(0, p.colors[0]);
    grd.addColorStop(0.5, p.colors[1]);
    grd.addColorStop(1, p.colors[2]);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.width, p.height, 0, 0, Math.PI*2);
    ctx.fill();

    // Gerakan lebih smooth
    p.x += p.vx * (p.type==="fire"?1:0.3);
    p.y += p.vy * (p.type==="fire"?1:0.5);
    p.life -= 0.008;
    p.width *= 0.97;
    p.height *= 0.97;
  });
  particles = particles.filter(p=>p.life>0 && p.width>0.5 && p.height>0.5);
}

function updateTrail(name,x,y){
  if(!trails[name]) trails[name]=[];
  trails[name].push({x,y});
  if(trails[name].length>25) trails[name].shift();
}

function drawTrails(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach((p,i)=>{
      if(i===0) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle="rgba(255,120,0,0.7)";
    ctx.lineWidth=2.5;
    ctx.shadowColor="rgba(255,60,0,0.5)";
    ctx.shadowBlur=10;
    ctx.stroke();
    ctx.shadowBlur=0;
  });
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    let totalSpeed = 0;
    let count = 0;

    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        if(k.score > 0.4){
          const speed = getSpeed(lastFrame[k.name], k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;

          addParticles(k.x,k.y);
          updateTrail(k.name,k.x,k.y);

          if(speed > 6) detectedMovement = true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }

    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }

    // Auto pause
    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    drawParticles();
    drawTrails();
    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
